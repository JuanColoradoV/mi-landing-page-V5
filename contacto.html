<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contáctanos para resolver dudas sobre tu pedido o recibir asesoría de estilo personalizada.">
    <meta name="theme-color" content="#804030">
    <title>TuTienda | Contacto</title>
    <!-- Importamos Tailwind CSS para un diseño moderno -->
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- ===== Header / Navbar ===== -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <noscript>
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <nav class="flex items-center justify-between">
                    <a href="index.html" class="text-lg font-bold text-gray-900">TuTienda</a>
                    <div class="flex items-center gap-4 text-sm font-medium">
                        <a href="ofertas.html" class="text-gray-700 hover:text-indigo-600">Ofertas</a>
                        <a href="carrito.html" class="text-gray-700 hover:text-indigo-600">Carrito</a>
                        <a href="contacto.html" class="text-gray-700 hover:text-indigo-600">Contacto</a>
                    </div>
                </nav>
            </div>
        </noscript>
        <!-- Contenido generado por js/layout.js -->
    </header>

    <main class="flex-grow">
        <!-- ===== Hero Section (Contacto) ===== -->
        <section class="hero-shell mb-16" data-variant="support">
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8">
                <div class="hero-grid">
                    <div class="hero-copy">
                        <span class="hero-kicker" data-i18n="contact_badge">Atención al cliente</span>
                        <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl hero-title">
                            <span class="block xl:inline" data-i18n="contact_title_1">Estamos aquí</span>
                            <span class="block hero-title-accent xl:inline" data-i18n="contact_title_2">para ayudarte</span>
                        </h1>
                        <p class="mt-4 text-base sm:text-lg md:text-xl hero-subtitle" data-i18n="contact_desc">
                            ¿Dudas sobre tu pedido o necesitas asesoría de estilo? Te respondemos rápido y con trato personalizado.
                        </p>
                        <div class="hero-actions">
                            <a href="#contact-form-section" class="inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 transition-transform hover:-translate-y-1" data-i18n="btn_write">
                                Escribir mensaje
                            </a>
                        </div>
                    </div>
                    <div class="hero-media">
                        <div class="hero-media-frame">
                            <video class="hero-video" autoplay loop muted playsinline preload="metadata" aria-hidden="true" poster="images/42-099/poster.jpg">
                                <source src="images/42-099/2468aca3b2e24d369016b4f5cd98039a.SD-480p.mp4" type="video/mp4">
                                Tu navegador no soporta videos HTML5.
                            </video>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ===== Contact Form and Info ===== -->
        <section id="contact-form-section" class="bg-gray-50 py-16">
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <!-- Columna del Formulario -->
                    <div class="bg-white p-8 rounded-lg shadow-lg">
                        <h2 class="text-2xl font-bold text-gray-900 mb-6" data-i18n="contact_form_title">Envíanos un mensaje</h2>
                        <form id="contact-form" action="#" method="POST" class="space-y-6" novalidate>
                            <!-- Honeypot Field (Invisible to humans) -->
                            <input type="text" name="website_trap" id="website_trap" class="hidden" tabindex="-1" autocomplete="off" aria-hidden="true">

                            <div>
                                <label for="name" class="block text-sm font-medium text-gray-700" data-i18n="label_name">Nombre</label>
                                <input type="text" name="name" id="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                                <p id="error-name" class="mt-1 text-sm text-red-600 hidden"></p>
                            </div>

                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-700" data-i18n="label_email">Email</label>
                                <input type="email" name="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                                <p id="error-email" class="mt-1 text-sm text-red-600 hidden"></p>
                            </div>

                            <div>
                                <label for="subject" class="block text-sm font-medium text-gray-700" data-i18n="label_subject">Asunto</label>
                                <input type="text" name="subject" id="subject" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
                                <p id="error-subject" class="mt-1 text-sm text-red-600 hidden"></p>
                            </div>

                            <div>
                                <label for="message" class="block text-sm font-medium text-gray-700" data-i18n="label_message">Mensaje</label>
                                <textarea id="message" name="message" rows="4" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 transition-colors"></textarea>
                                <p id="error-message" class="mt-1 text-sm text-red-600 hidden"></p>
                            </div>

                            <div>
                                <button type="submit" class="w-full inline-flex justify-center py-3 px-6 border border-transparent shadow-sm text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all" data-i18n="btn_send">
                                    Enviar mensaje
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Columna de Información -->
                    <div class="space-y-8">
                        <div class="bg-white p-8 rounded-lg shadow-lg">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6" data-i18n="contact_info_title">Información de contacto</h2>
                            <div class="space-y-4">
                                <div class="flex items-start">
                                    <svg class="flex-shrink-0 h-6 w-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                    <span class="ml-3 text-base text-gray-700">info@tutienda.com</span>
                                </div>

                                <div class="flex items-start">
                                    <svg class="flex-shrink-0 h-6 w-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                                    <span class="ml-3 text-base text-gray-700">+57 300 123 4567</span>
                                </div>

                                <div class="flex items-start">
                                    <svg class="flex-shrink-0 h-6 w-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    <span class="ml-3 text-base text-gray-700">Calle Falsa 123, Bogotá, Colombia</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-8 rounded-lg shadow-lg">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6" data-i18n="contact_social_title">Síguenos</h2>
                            <div class="flex items-center space-x-6">
                                <!-- Instagram -->
                                <a href="#" target="_blank" rel="noopener noreferrer" class="hover:opacity-80 transition-opacity">
                                    <img src="images/icons/instagram.svg" alt="Instagram" class="w-10 h-10" loading="lazy" decoding="async">
                                </a>
                                <!-- WhatsApp -->
                                <a href="#" target="_blank" rel="noopener noreferrer" class="hover:opacity-80 transition-opacity">
                                    <img src="images/icons/whatsapp.svg" alt="WhatsApp" class="w-10 h-10" loading="lazy" decoding="async">
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== Footer ===== -->
    <footer class="bg-white border-t border-gray-200">
        <noscript>
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8 py-6 text-sm text-gray-600 flex flex-col sm:flex-row gap-2 sm:justify-between">
                <span>© 2026 TuTienda. Todos los derechos reservados.</span>
                <div class="flex items-center gap-4">
                    <a href="ofertas.html" class="hover:text-indigo-600">Ofertas</a>
                    <a href="contacto.html" class="hover:text-indigo-600">Contacto</a>
                </div>
            </div>
        </noscript>
        <!-- Contenido generado por js/layout.js -->
    </footer>

    <!-- ===== JavaScript ===== -->
    <script type="module" src="js/app/init-contact.js"></script>
</body>
</html>
