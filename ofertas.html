<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aprovecha ofertas de temporada con descuentos especiales en prendas seleccionadas.">
    <meta name="theme-color" content="#804030">
    <title>TuTienda | Ofertas</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- ===== Header / Navbar ===== -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <noscript>
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <nav class="flex items-center justify-between">
                    <a href="index.html" class="text-lg font-bold text-gray-900">TuTienda</a>
                    <div class="flex items-center gap-4 text-sm font-medium">
                        <a href="ofertas.html" class="text-gray-700 hover:text-red-600">Ofertas</a>
                        <a href="carrito.html" class="text-gray-700 hover:text-red-600">Carrito</a>
                        <a href="contacto.html" class="text-gray-700 hover:text-red-600">Contacto</a>
                    </div>
                </nav>
            </div>
        </noscript>
        <!-- Contenido generado por js/layout.js -->
    </header>

    <!-- ===== Main Content Wrapper ===== -->
    <main class="flex-grow">

        <!-- ===== Hero Section (Ofertas) ===== -->
        <section class="hero-shell" data-variant="offers">
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8">
                <div class="hero-grid">
                    <div class="hero-copy">
                        <span class="hero-kicker" data-i18n="offers_badge">Tiempo limitado</span>
                        <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl hero-title">
                            <span class="block xl:inline" data-i18n="offers_title_1">Ofertas de</span>
                            <span class="block hero-title-accent xl:inline" data-i18n="offers_title_2">Temporada</span>
                        </h1>
                        <p class="mt-4 text-base sm:text-lg md:text-xl hero-subtitle" data-i18n="offers_desc">
                            Renueva tu armario con descuentos reales en nuestros más vendidos. Calidad y estilo por menos.
                        </p>
                        <div class="hero-actions">
                            <a href="#product-grid" class="inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 transition-transform hover:-translate-y-1" data-i18n="btn_discounts">
                                Ver descuentos
                            </a>
                        </div>
                    </div>
                    <div class="hero-media">
                        <div class="hero-media-frame">
                            <video class="hero-video" autoplay loop muted playsinline preload="metadata" aria-hidden="true" poster="images/30-558/poster.jpg">
                                <source src="images/30-558/101f074268734a93a61482f11da71925.SD-480p.mp4" type="video/mp4">
                                Tu navegador no soporta videos HTML5.
                            </video>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ===== Product Grid ===== -->
        <div class="bg-gray-50 py-16">
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8">
                <h2 id="product-grid" class="text-3xl font-bold text-gray-900 text-center mb-12" data-i18n="section_offers">
                    Productos en oferta
                </h2>
                <!-- El contenedor de los productos se llenará con JavaScript -->
                <div id="products-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 items-start" aria-live="polite">
                    <p class="text-center text-gray-600 md:col-span-2 lg:col-span-3 py-12" role="status" data-i18n="loading_offers">Cargando ofertas...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ===== Footer ===== -->
    <footer class="bg-white border-t border-gray-200">
        <noscript>
            <div class="max-w-[1750px] mx-auto px-4 sm:px-6 lg:px-8 py-6 text-sm text-gray-600 flex flex-col sm:flex-row gap-2 sm:justify-between">
                <span>© 2026 TuTienda. Todos los derechos reservados.</span>
                <div class="flex items-center gap-4">
                    <a href="ofertas.html" class="hover:text-red-600">Ofertas</a>
                    <a href="contacto.html" class="hover:text-red-600">Contacto</a>
                </div>
            </div>
        </noscript>
        <!-- Contenido generado por js/layout.js -->
    </footer>

    <!-- ===== JavaScript ===== -->
    <script type="module" src="js/app/init-offers.js"></script>

</body>
</html>
